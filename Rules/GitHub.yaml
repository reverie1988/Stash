payload:
  # NAME: GitHub
  # DESCRIPTION: GitHub / GitHubusercontent / GitHub Actions / GitHub Releases / GitHub Copilot / GitHub Container Registry / NPM 分流规则
  # UPDATED: 2026-05-15
  # ================================
  # 规则说明
  # ================================
  # - github.com：GitHub 主站、Gist、Codeload、API 等
  # - githubusercontent.com：Raw、Objects、Actions、Release、Copilot telemetry 等资源
  # - githubcopilot.com：GitHub Copilot 服务
  # - ghcr.io：GitHub Container Registry
  # - npmjs.com / npmjs.org：NPM 相关服务
  # - 不加入大段 IP-CIDR，GitHub IP 会变化，建议以域名规则为主
  #
  # ================================
  # 规则统计：自建增强版
  # ================================
  # HOST: 16
  # HOST-SUFFIX: 44
  # HOST-WILDCARD: 3
  # HOST-KEYWORD: 1
  #
  # ================================
  # GitHub 精确域名
  # ================================

  - DOMAIN,api.github.com
  - DOMAIN,codeload.github.com
  - DOMAIN,gist.github.com
  - DOMAIN,lfs.github.com
  - DOMAIN,raw.githubusercontent.com
  - DOMAIN,objects.githubusercontent.com
  - DOMAIN,actions.githubusercontent.com
  - DOMAIN,github-cloud.githubusercontent.com
  - DOMAIN,github-releases.githubusercontent.com
  - DOMAIN,github-registry-files.githubusercontent.com
  - DOMAIN,copilot-proxy.githubusercontent.com
  - DOMAIN,origin-tracker.githubusercontent.com
  - DOMAIN,copilot-telemetry.githubusercontent.com
  - DOMAIN,collector.github.com
  - DOMAIN,scanning-api.github.com
  - DOMAIN,api.mcp.github.com

  # ================================
  # GitHub 主域名 / 官方服务
  # ================================

  - DOMAIN-SUFFIX,github.com
  - DOMAIN-SUFFIX,github.io
  - DOMAIN-SUFFIX,githubusercontent.com
  - DOMAIN-SUFFIX,githubassets.com
  - DOMAIN-SUFFIX,github.dev
  - DOMAIN-SUFFIX,githubstatus.com
  - DOMAIN-SUFFIX,github.blog
  - DOMAIN-SUFFIX,githubapp.com
  - DOMAIN-SUFFIX,githubpreview.dev
  - DOMAIN-SUFFIX,github.community
  - DOMAIN-SUFFIX,githubnext.com
  - DOMAIN-SUFFIX,githubhackathon.com
  - DOMAIN-SUFFIX,githubuniverse.com
  - DOMAIN-SUFFIX,thegithubshop.com
  - DOMAIN-SUFFIX,myoctocat.com
  - DOMAIN-SUFFIX,repo.new

  # ================================
  # GitHub Raw / Release / Actions / Assets
  # ================================

  - DOMAIN-SUFFIX,raw.githubusercontent.com
  - DOMAIN-SUFFIX,objects.githubusercontent.com
  - DOMAIN-SUFFIX,actions.githubusercontent.com
  - DOMAIN-SUFFIX,github-cloud.githubusercontent.com
  - DOMAIN-SUFFIX,github-releases.githubusercontent.com
  - DOMAIN-SUFFIX,github-registry-files.githubusercontent.com
  - DOMAIN-SUFFIX,github-cloud.s3.amazonaws.com
  - DOMAIN-SUFFIX,github-avatars.oss-cn-hongkong.aliyuncs.com

  # ================================
  # GitHub Release / 用户资源 S3 补充
  # ================================
  # 这些用于部分 Release 附件、仓库文件、用户上传资源
  # 使用 HOST-WILDCARD 限定 GitHub 前缀，避免误伤整个 S3

  - DOMAIN-WILDCARD,github-production-release-asset-*.s3.amazonaws.com
  - DOMAIN-WILDCARD,github-production-repository-file-*.s3.amazonaws.com
  - DOMAIN-WILDCARD,github-production-user-asset-*.s3.amazonaws.com

  # ================================
  # GitHub Copilot
  # ================================
  # Copilot 官方 allowlist 包含 githubcopilot.com、individual/business/enterprise 子域
  # 以及 copilot-proxy / origin-tracker / telemetry 等 githubusercontent 域名

  - DOMAIN-SUFFIX,githubcopilot.com
  - DOMAIN-SUFFIX,individual.githubcopilot.com
  - DOMAIN-SUFFIX,business.githubcopilot.com
  - DOMAIN-SUFFIX,enterprise.githubcopilot.com

  # ================================
  # GitHub Container Registry / Dependabot
  # ================================

  - DOMAIN-SUFFIX,ghcr.io
  - DOMAIN-SUFFIX,dependabot.com

  # ================================
  # GitHub 旧服务 / 跳转 / 兼容
  # ================================

  - DOMAIN-SUFFIX,git.io
  - DOMAIN-SUFFIX,atom.io
  - DOMAIN-SUFFIX,github-atom-io-herokuapp-com.freetls.fastly.net
  - DOMAIN-SUFFIX,rawgit.com
  - DOMAIN-SUFFIX,rawgithub.com

  # ================================
  # NPM / GitHub 生态
  # ================================
  # blackmatrix7 GitHub 规则包含 npmjs.com / npmjs.org / npm.community
  # 如果你不想让 NPM 走 GitHub 策略组，可以注释这一段

  - DOMAIN-SUFFIX,npmjs.com
  - DOMAIN-SUFFIX,npmjs.org
  - DOMAIN-SUFFIX,npm.community

  # ================================
  # 开源相关
  # ================================

  - DOMAIN-SUFFIX,opensource.guide

  # ================================
  # GitHub 关键词
  # ================================

  - DOMAIN-KEYWORD,github
