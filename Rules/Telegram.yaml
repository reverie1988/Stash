  # Converted from Quantumult X Filter
  # Rule Name: Apple
  # Converted At: 2026-05-15 21:43:25

  # NAME: Telegram
  # AUTHOR: steak
  # TYPE: Quantumult X Filter
  # DESCRIPTION: Telegram / Telegram X / Telegram Desktop / Telegram Web / 第三方 Telegram 客户端相关分流规则
  # SOURCE: Based on blackmatrix7/ios_rule_script Telegram rules
  # UPDATED: 2026-05-11
  #
  # ================================
  # 使用说明
  # ================================
  # 1. 文件名建议：Telegram.list
  # 2. 适用于：Quantumult X [filter_remote]
  # 3. 策略组名称：Telegram
  # 4. 如果你的策略组不是 Telegram，请在 QX 的 force-policy 中指定实际策略组
  # 5. IP-CIDR / IP6-CIDR 后加入 no-resolve，避免触发不必要 DNS 解析
  #
  # QX 远程订阅示例：
  # https://raw.githubusercontent.com/你的用户名/你的仓库/main/Rules/Telegram.list, tag=Telegram, force-policy=Telegram, update-interval=86400, opt-parser=false, enabled=true
  #
  # ================================
  # 规则统计
  # ================================
  # HOST: 2
  # HOST-KEYWORD: 1
  # HOST-SUFFIX: 22
  # IP-CIDR: 6
  # IP6-CIDR: 4
  # IP-ASN: 5
  # TOTAL: 40
  #
  # ================================
  # Telegram API / 第三方客户端
  # ================================

  - DOMAIN,api.imem.app
  - DOMAIN,api.swiftgram.app

  # ================================
  # Telegram 域名规则
  # ================================

  - DOMAIN-SUFFIX,cdn-telegram.org
  - DOMAIN-SUFFIX,comments.app
  - DOMAIN-SUFFIX,contest.com
  - DOMAIN-SUFFIX,graph.org
  - DOMAIN-SUFFIX,legra.ph
  - DOMAIN-SUFFIX,mbrx.app
  - DOMAIN-SUFFIX,quiz.directory
  - DOMAIN-SUFFIX,stel.com
  - DOMAIN-SUFFIX,t.me
  - DOMAIN-SUFFIX,tdesktop.com
  - DOMAIN-SUFFIX,telega.one
  - DOMAIN-SUFFIX,telegra.ph
  - DOMAIN-SUFFIX,telegram-cdn.org
  - DOMAIN-SUFFIX,telegram.dog
  - DOMAIN-SUFFIX,telegram.me
  - DOMAIN-SUFFIX,telegram.org
  - DOMAIN-SUFFIX,telegram.space
  - DOMAIN-SUFFIX,telegramdownload.com
  - DOMAIN-SUFFIX,telesco.pe
  - DOMAIN-SUFFIX,tg.dev
  - DOMAIN-SUFFIX,tx.me
  - DOMAIN-SUFFIX,usercontent.dev

  # ================================
  # Telegram 第三方客户端关键词
  # ================================

  - DOMAIN-KEYWORD,nicegram

  # ================================
  # Telegram IPv4 段
  # ================================
  # no-resolve：IP 规则无需 DNS 解析，减少误解析和延迟

  - IP-CIDR,109.239.140.0/24,no-resolve
  - IP-CIDR,139.59.210.98/32,no-resolve
  - IP-CIDR,149.154.160.0/20,no-resolve
  - IP-CIDR,196.55.216.167/32,no-resolve
  - IP-CIDR,5.28.192.0/18,no-resolve
  - IP-CIDR,91.108.0.0/16,no-resolve

  # ================================
  # Telegram IPv6 段
  # ================================

  - IP-CIDR6,2001:67c:4e8::/48,no-resolve
  - IP-CIDR6,2001:b28:f23c::/47,no-resolve
  - IP-CIDR6,2001:b28:f23f::/48,no-resolve
  - IP-CIDR6,2a0a:f280::/29,no-resolve

  # ================================
  # Telegram ASN
  # ================================
  # ASN 规则用于匹配 Telegram 相关自治系统网络

  - IP-ASN,211157
  - IP-ASN,44907
  - IP-ASN,59930
  - IP-ASN,62014
  - IP-ASN,62041

